<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F0F5FF">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Patrimoine">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Mon patrimoine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070D1A;
  --surface: #0E1524;
  --card: #131C2E;
  --card2: #1A2540;
  --border: #1E2D4A;
  --border2: #263652;
  --accent: #4F8EF7;
  --accent2: #00C2CB;
  --accent-dim: rgba(79,142,247,0.13);
  --text: #E8EFFF;
  --text2: #7B92B2;
  --text3: #3A4F6E;
  --gain: #00D68F;
  --gain-dim: rgba(0,214,143,0.1);
  --loss: #FF5A5A;
  --loss-dim: rgba(255,90,90,0.1);
  --nav: 64px;
  --r: 16px;
  --r2: 11px;
}
[data-theme="light"] {
  --bg: #F0F5FF;
  --surface: #FFFFFF;
  --card: #FFFFFF;
  --card2: #F4F8FF;
  --border: #E0E8F5;
  --border2: #C8D8EE;
  --accent: #2563EB;
  --accent2: #0891B2;
  --accent-dim: rgba(37,99,235,0.09);
  --text: #0F1E3A;
  --text2: #4A6080;
  --text3: #9AAABB;
  --gain: #059669;
  --gain-dim: rgba(5,150,105,0.08);
  --loss: #DC2626;
  --loss-dim: rgba(220,38,38,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
#app{width:100%;max-width:480px;height:100vh;height:100dvh;margin:0 auto;position:relative;overflow:hidden}

/* SCREENS */
.screen{position:absolute;inset:0;background:var(--bg);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px;transform:translateX(100%);will-change:transform}
.screen.no-nav{padding-bottom:20px}
#s-dashboard{transform:translateX(0)}

/* NAV */
#nav{position:absolute;bottom:0;left:0;right:0;height:var(--nav);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:50;transition:opacity .2s}
#nav.hidden{opacity:0;pointer-events:none}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--text3);transition:color .2s;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn.on{color:var(--accent)}
.nav-btn svg{width:22px;height:22px}
.nav-btn span{font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.nav-pip{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .2s;margin-top:-2px}
.nav-btn.on .nav-pip{opacity:1}

/* TYPOGRAPHY */
.t-hero{font-size:34px;font-weight:800;letter-spacing:-1.2px;line-height:1}
.t-title{font-size:20px;font-weight:800;letter-spacing:-.5px}
.t-section{font-size:11px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--text2)}
.t-label{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--text3)}
.t-body{font-size:14px}
.t-sm{font-size:12px;color:var(--text2)}
.t-gain{color:var(--gain)}
.t-loss{color:var(--loss)}
.t-accent{color:var(--accent)}
.t-muted{color:var(--text2)}
.t-num{font-variant-numeric:tabular-nums}

/* LAYOUT HELPERS */
.px{padding-left:20px;padding-right:20px}
.row{display:flex;align-items:center}
.col{display:flex;flex-direction:column}
.gap4{gap:4px}
.gap8{gap:8px}
.gap12{gap:12px}
.gap16{gap:16px}
.gap20{gap:20px}
.flex1{flex:1;min-width:0}
.right{text-align:right}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}

/* BACK BUTTON */
.back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;padding:14px 20px 6px;min-height:44px}
.back svg{width:20px;height:20px}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:700}
.badge.up{background:var(--gain-dim);color:var(--gain)}
.badge.dn{background:var(--loss-dim);color:var(--loss)}
.badge.neutral{background:var(--accent-dim);color:var(--accent)}

/* TOGGLE */
.toggle{width:46px;height:26px;border-radius:13px;background:var(--border2);position:relative;cursor:pointer;transition:background .25s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.35)}
.toggle.on .toggle-thumb{transform:translateX(20px)}

/* RIPPLE */
.tap{cursor:pointer;transition:background .12s, opacity .12s}
.tap:active{opacity:.75}

/* SEPARATOR */
.sep{height:1px;background:var(--border);margin:0 16px}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--nav) + 12px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ANIMATIONS */
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.anim{animation:up .35s ease both}
.anim:nth-child(1){animation-delay:.04s}
.anim:nth-child(2){animation-delay:.09s}
.anim:nth-child(3){animation-delay:.14s}
.anim:nth-child(4){animation-delay:.19s}
.anim:nth-child(5){animation-delay:.24s}
.anim:nth-child(6){animation-delay:.29s}
.anim:nth-child(7){animation-delay:.34s}

/* ─── DASHBOARD ─── */
.dash-top{padding:24px 20px 0}
.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-.5px}
.wealth-card{background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 60%,#0891b2 100%);border:none;border-radius:var(--r);margin:20px 20px 0;padding:22px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(37,99,235,.28)}
.wealth-card::before{content:'';position:absolute;top:-60px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.07);pointer-events:none}
.wealth-card::after{content:'';position:absolute;bottom:-50px;left:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none}
.wealth-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:6px}
.wealth-amount{font-size:38px;font-weight:900;letter-spacing:-1.5px;color:#fff;line-height:1}
.acc-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:background .12s}
.acc-card:active{background:var(--card2)}
.acc-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.acc-bar{height:2px;border-radius:2px;background:var(--border);margin-top:12px;overflow:hidden}
.acc-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}

/* ─── ACCOUNT DETAIL ─── */
.acc-hero{padding:8px 20px 18px;border-bottom:1px solid var(--border)}
.acc-hero-val{background:linear-gradient(135deg,var(--text) 0%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:30px;font-weight:800;letter-spacing:-1px;margin:4px 0 10px}
.stat-row{display:flex;gap:20px}
.stat-box .t-label{margin-bottom:3px}
.ticker{width:44px;height:44px;border-radius:12px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--accent);letter-spacing:-.3px;flex-shrink:0}

/* ─── TABS ─── */
.tabs{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid var(--border);color:var(--text2);transition:all .18s;flex-shrink:0}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ─── STOCK DETAIL ─── */
.stock-hero{padding:8px 20px 18px;border-bottom:1px solid var(--border)}
.stock-ticker-badge{display:inline-block;padding:3px 10px;background:var(--accent-dim);color:var(--accent);border-radius:6px;font-size:12px;font-weight:800;letter-spacing:.5px;margin-bottom:6px}
.stock-price{font-size:36px;font-weight:900;letter-spacing:-1.5px;margin:6px 0 4px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 20px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:13px}
.metric .t-label{margin-bottom:5px}
.metric-val{font-size:17px;font-weight:800;letter-spacing:-.3px}
.tx-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border)}
.tx-item:last-child{border-bottom:none}
.tx-dot{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;letter-spacing:.3px}
.tx-dot.buy{background:var(--gain-dim);color:var(--gain)}
.tx-dot.sell{background:var(--loss-dim);color:var(--loss)}

/* ─── ANALYSIS ─── */
.analysis-top{padding:22px 20px 10px}
.donut-block{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin:0 20px 14px;display:flex;align-items:center;gap:18px}
.legend{flex:1}
.legend-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.legend-row:last-child{margin-bottom:0}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-name{flex:1;font-size:12px;color:var(--text2)}
.leg-pct{font-size:12px;font-weight:800}

/* ─── SETTINGS ─── */
.settings-top{padding:22px 20px 4px}
.s-section{font-size:11px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--text3);padding:18px 20px 8px}
.s-group{margin:0 20px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.s-item{display:flex;align-items:center;gap:14px;padding:15px 16px;transition:background .12s;cursor:pointer;border-bottom:1px solid var(--border)}
.s-item:last-child{border-bottom:none}
.s-item:active{background:var(--card2)}
.s-ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.s-ico svg{width:18px;height:18px}
.s-name{font-size:15px;font-weight:500}
.s-sub{font-size:11px;color:var(--text2);margin-top:1px}
.s-val{font-size:13px;color:var(--text2)}
.s-input{flex:1;background:transparent;border:none;outline:none;font-size:15px;color:var(--text);font-family:inherit;text-align:right}
.cur-opts{display:flex;gap:6px}
.cur-opt{padding:4px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);color:var(--text2);transition:all .15s}
.cur-opt.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chev{color:var(--text3);flex-shrink:0}
.csv-hint{font-size:11px;color:var(--text3);padding:6px 16px 12px 64px;line-height:1.6}
#csv-file{display:none}

/* ─── SEARCH ─── */
.search-wrap{padding:10px 20px 2px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0 14px;height:42px}
.search-box svg{width:16px;height:16px;color:var(--text3);flex-shrink:0}
.search-box input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--text);font-family:inherit}
.search-box input::placeholder{color:var(--text3)}
.search-clear{width:20px;height:20px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--text2);flex-shrink:0}

/* ─── SORT PILLS ─── */
.sort-row{display:flex;gap:6px;padding:8px 20px 0;overflow-x:auto;scrollbar-width:none}
.sort-row::-webkit-scrollbar{display:none}
.sort-pill{display:inline-flex;align-items:center;gap:3px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid var(--border);color:var(--text2);transition:all .15s;flex-shrink:0}
.sort-pill.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ─── HOLD ROWS ─── */
.hold-item{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
.hold-item:last-child{border-bottom:none}
.hold-item:active{background:var(--card2)}
.hold-del-btn{width:32px;height:32px;border-radius:9px;background:var(--loss-dim);display:flex;align-items:center;justify-content:center;color:var(--loss);flex-shrink:0;cursor:pointer;transition:background .15s}
.hold-del-btn:active{background:var(--loss);color:#fff}
.hold-del-btn svg{width:15px;height:15px;pointer-events:none}
.hold-add-btn{width:32px;height:32px;border-radius:9px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0;cursor:pointer;transition:background .15s}
.hold-add-btn:active{background:var(--accent);color:#fff}
.hold-add-btn svg{width:18px;height:18px;pointer-events:none}

/* ─── PULL TO REFRESH ─── */
.ptr-bar{height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text2);font-size:12px;font-weight:600;transition:height .2s}
.ptr-bar.open{height:46px}
@keyframes ptr-spin{to{transform:rotate(360deg)}}
.ptr-spin{display:inline-block;animation:ptr-spin .7s linear infinite}

/* ─── HISTORY CHART ─── */
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin:14px 20px 0;padding:16px 16px 12px;position:relative}
.hist-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hist-periods{display:flex;gap:5px}
.hperiod{padding:3px 10px;border-radius:14px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);color:var(--text2);transition:all .15s}
.hperiod.on{background:var(--accent);border-color:var(--accent);color:#fff}
.hist-wrap{position:relative;user-select:none}
.hist-tip{position:absolute;top:4px;left:0;background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:4px 9px;font-size:11px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .1s;white-space:nowrap;z-index:10}
.hist-range{display:flex;justify-content:space-between;margin-top:3px}
.hist-range span{font-size:10px;color:var(--text3)}

/* ─── ALLOCATION TARGETS ─── */
.tgt-block{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin:0 20px 14px;padding:16px}
.tgt-row{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.tgt-row:last-child{margin-bottom:0}
.tgt-label{width:78px;font-size:12px;font-weight:700;color:var(--text2);flex-shrink:0}
.tgt-bars{flex:1;position:relative;height:14px}
.tgt-bar-bg{position:absolute;bottom:0;left:0;right:0;height:6px;border-radius:3px;background:var(--border);overflow:visible}
.tgt-bar-actual{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.tgt-mark-line{position:absolute;top:-4px;bottom:-4px;width:2px;border-radius:1px;background:rgba(255,255,255,.5);transform:translateX(-50%)}
.tgt-inp{width:38px;text-align:right;background:transparent;border:none;outline:none;font-size:12px;font-weight:800;color:var(--accent);font-family:inherit}
.tgt-dev{font-size:11px;font-weight:700;width:38px;text-align:right;flex-shrink:0}

/* ─── DIVIDENDS ─── */
.tx-dot.div{background:rgba(245,158,11,.14);color:#F59E0B}

/* ─── SIMULATOR ─── */
.sim-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin:0 20px 14px;padding:16px}
.sim-head{font-size:12px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text2);margin-bottom:12px}
input.sim-range{width:100%;-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;background:var(--border2);outline:none;cursor:pointer;margin:6px 0 14px;display:block}
input.sim-range::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 2px 8px rgba(79,142,247,.45)}
.sim-price-display{font-size:26px;font-weight:900;letter-spacing:-1px;text-align:center;margin-bottom:2px}
.sim-chg{text-align:center;font-size:12px;font-weight:700;margin-bottom:14px}
.sim-res-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.sim-res-row:last-child{border-bottom:none}
.sim-res-lbl{font-size:12px;color:var(--text2)}
.sim-res-val{font-size:14px;font-weight:800}

/* ─── WATCHLIST ─── */
.watch-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin:14px 20px 0;overflow:hidden}
.watch-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 11px;border-bottom:1px solid var(--border)}
.watch-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);transition:background .12s;cursor:default}
.watch-item:last-child{border-bottom:none}
.watch-tick{width:40px;height:40px;border-radius:10px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--accent);letter-spacing:-.3px;flex-shrink:0;text-align:center;line-height:1.2}

/* ─── ADD ORDER MODAL ─── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(110%);width:100%;max-width:480px;background:var(--surface);border-radius:20px 20px 0 0;z-index:201;transition:transform .32s cubic-bezier(.4,0,.2,1);padding-bottom:max(20px,env(safe-area-inset-bottom))}
.modal-sheet.show{transform:translateX(-50%) translateY(0)}
.modal-drag{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 18px}
.modal-body{padding:0 20px 8px}
.modal-title{font-size:17px;font-weight:800;letter-spacing:-.3px;margin-bottom:16px}
.modal-ticker{display:inline-block;font-size:12px;font-weight:800;color:var(--accent);background:var(--accent-dim);padding:2px 8px;border-radius:6px;margin-right:8px;vertical-align:middle}
.type-btns{display:flex;gap:8px;margin-bottom:16px}
.type-btn{flex:1;padding:9px 4px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--text2);text-align:center;transition:all .15s;user-select:none}
.type-btn.buy.on{background:var(--gain-dim);border-color:var(--gain);color:var(--gain)}
.type-btn.sell.on{background:var(--loss-dim);border-color:var(--loss);color:var(--loss)}
.type-btn.div.on{background:rgba(245,158,11,.12);border-color:#F59E0B;color:#F59E0B}
.form-row{display:flex;gap:10px;margin-bottom:14px}
.form-field{flex:1;display:flex;flex-direction:column;gap:5px}
.form-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text2)}

// ═══════════════════════════════════════════════
// FORMATTING
// ═══════════════════════════════════════════════
function fmtCur(v) {
  return new Intl.NumberFormat('fr-FR',{style:'currency',currency:S.currency,minimumFractionDigits:2,maximumFractionDigits:2}).format(v);
}
function fmtPct(v) { return (v>=0?'+':'')+v.toFixed(2).replace('.',',')+' %'; }
function fmtDate(s) { return new Date(s).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); }
function initials(n) { return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function totalWealth() { return S.accounts.reduce((s,a)=>s+a.value,0); }

// ═══════════════════════════════════════════════
// CHARTS
// ═══════════════════════════════════════════════
function sparkData(base, n=22, vol=0.025) {
  const d=[base];
  for(let i=1;i<n;i++) d.push(d[i-1]+d[i-1]*vol*(Math.random()*2-.85));
  d[d.length-1]=base;
  return d;
}

function sparkSvg(data, w, h, color='#4F8EF7', fill=true) {
  if(!data||data.length<2) return '';
  const mn=Math.min(...data), mx=Math.max(...data), rng=mx-mn||1;
  const pts=data.map((v,i)=>`${((i/(data.length-1))*w).toFixed(1)},${(h-((v-mn)/rng)*h*.9-h*.05).toFixed(1)}`);
  const line='M'+pts.join('L');
  const area=line+`L${w},${h}L0,${h}Z`;
  const gid='g'+Math.random().toString(36).slice(2,6);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block">
    ${fill?`<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".28"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs><path d="${area}" fill="url(#${gid})"/>`:``}
    <path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function donutSvg(segs, size=108, sw=16) {
  const cx=size/2, cy=size/2, r=(size-sw)/2;
  const C=2*Math.PI*r;
  const tot=segs.reduce((s,sg)=>s+sg.value,0);
  let acc=0;
  const circles=segs.map(sg=>{
    const dash=(sg.value/tot)*C-1.5;
    const gap=C-dash;
    const off=-acc;
    acc+=(sg.value/tot)*C;
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${sg.color}"
      stroke-width="${sw}" stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}"
      stroke-dashoffset="${off.toFixed(2)}" stroke-linecap="butt"
      transform="rotate(-90 ${cx} ${cy})"/>`;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${sw}"/>
    ${circles.join('')}
  </svg>`;
}

// ═══════════════════════════════════════════════
// HISTORY CHART
// ═══════════════════════════════════════════════
function genHistData(period) {
  const w = totalWealth();
  const key = period + '_' + Math.round(w / 100);
  if (S._histCache[key]) return S._histCache[key];
  const n = { '1S': 7, '1M': 30, '3M': 90, '1A': 252 }[period] || 30;
  const pts = new Array(n);
  pts[n - 1] = w;
  for (let i = n - 2; i >= 0; i--) {
    const drift = period === '1A' ? 0.0008 : 0.0003;
    pts[i] = pts[i + 1] / (1 + drift + (Math.random() * 0.032 - 0.015));
  }
  S._histCache[key] = pts;
  return pts;
}

function histSvg(pts, w, h) {
  if (!pts || pts.length < 2) return '';
  const mn = Math.min(...pts), mx = Math.max(...pts), rng = mx - mn || 1;
  const pad = 2;
  const last = pts[pts.length - 1], first = pts[0];
  const color = last >= first ? 'var(--gain)' : 'var(--loss)';
  const xs = pts.map((_, i) => pad + (i / (pts.length - 1)) * (w - pad * 2));
  const ys = pts.map(v => pad + (1 - (v - mn) / rng) * (h - pad * 2));
  const line = 'M' + xs.map((x, i) => `${x.toFixed(1)},${ys[i].toFixed(1)}`).join('L');
  const area = line + `L${xs[xs.length-1].toFixed(1)},${h}L${xs[0].toFixed(1)},${h}Z`;
  const gid = 'hg' + Math.random().toString(36).slice(2, 7);
  return `<svg id="hist-svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;overflow:visible;cursor:crosshair">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".2"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line id="hist-xhair" x1="0" y1="0" x2="0" y2="${h}" stroke="var(--text3)" stroke-width="1" stroke-dasharray="3,3" opacity="0"/>
    <circle id="hist-dot" cx="0" cy="0" r="4" fill="${color}" stroke="var(--bg)" stroke-width="2" opacity="0"/>
  </svg>`;
}

function initHistChart(container, pts) {
  const svg = container.querySelector('#hist-svg');
  const tip = container.querySelector('.hist-tip');
  if (!svg || !pts || pts.length < 2) return;
  const mn = Math.min(...pts), mx = Math.max(...pts), rng = mx - mn || 1;
  const pad = 2;
  const xhair = svg.querySelector('#hist-xhair');
  const dot = svg.querySelector('#hist-dot');

  function update(clientX) {
    const rect = svg.getBoundingClientRect();
    const relX = Math.max(0, Math.min(rect.width, clientX - rect.left));
    const idx = Math.round((relX - pad) / (rect.width - pad * 2) * (pts.length - 1));
    const i = Math.max(0, Math.min(pts.length - 1, idx));
    const x = pad + (i / (pts.length - 1)) * (rect.width - pad * 2);
    const y = pad + (1 - (pts[i] - mn) / rng) * (rect.height - pad * 2);
    xhair.setAttribute('x1', x.toFixed(1)); xhair.setAttribute('x2', x.toFixed(1));
    xhair.setAttribute('opacity', '1');
    dot.setAttribute('cx', x.toFixed(1)); dot.setAttribute('cy', y.toFixed(1));
    dot.setAttribute('opacity', '1');
    let tipX = relX + 10;
    if (tipX + 115 > rect.width) tipX = relX - 125;
    tip.style.left = Math.max(0, tipX) + 'px';
    tip.style.top = Math.max(0, y - 22) + 'px';
    tip.style.opacity = '1';
    tip.textContent = fmtCur(pts[i]);
  }
  function hide() {
    xhair.setAttribute('opacity', '0');
    dot.setAttribute('opacity', '0');
    tip.style.opacity = '0';
  }
  svg.addEventListener('touchstart', e => { e.stopPropagation(); update(e.touches[0].clientX); }, { passive: true });
  svg.addEventListener('touchmove', e => { e.stopPropagation(); update(e.touches[0].clientX); }, { passive: true });
  svg.addEventListener('touchend', hide, { passive: true });
  svg.addEventListener('mousemove', e => update(e.clientX));
  svg.addEventListener('mouseleave', hide);
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
const EASE='cubic-bezier(.4,0,.2,1)';
const NAV_SCREENS=['dashboard','analysis'];

// dir: 'back' | 'forward' | null (null = auto-detect from stack for hierarchical nav)
function go(target, dir=null) {
  if(target===S.screen) return;
  const prevEl=document.getElementById('s-'+S.screen);
  const nextEl=document.getElementById('s-'+target);

  // Direction: explicit for tab nav, auto-detect from stack for back()
  const isBack = dir!=null ? dir==='back'
    : (S.stack.length>1 && S.stack[S.stack.length-2]===target);

  // Always re-render for tab nav and forward; skip re-render on hierarchical back (preserves scroll)
  if(dir!=null || !isBack) renderScreen(target);

  // Bring both transitioning screens above inactive ones
  prevEl.style.zIndex='1';
  nextEl.style.zIndex='2';

  nextEl.style.transition='none';
  nextEl.style.transform=isBack?'translateX(-22%)':'translateX(100%)';
  nextEl.offsetHeight; // force reflow
  nextEl.style.transition=`transform .32s ${EASE}`;
  prevEl.style.transition=`transform .32s ${EASE}`;
  nextEl.style.transform='translateX(0)';
  prevEl.style.transform=isBack?'translateX(100%)':'translateX(-22%)';

  // Stack management
  if(dir!=null) S.stack=[target];        // tab nav: flat stack
  else if(isBack) S.stack.pop();          // back(): unwind
  else S.stack.push(target);              // forward: push

  S.screen=target;
  setTimeout(()=>{ prevEl.style.zIndex=''; nextEl.style.zIndex=''; }, 350);

  const showNav=NAV_SCREENS.includes(target);
  document.getElementById('nav').classList.toggle('hidden',!showNav);
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('on',b.dataset.nav===target));
}

function back() {
  if(S.stack.length>1) go(S.stack[S.stack.length-2]);
}

}

// ── HISTORY CARD ──

// ── HOLDS HELPERS ──
function getFilteredHoldings(acc) {
  let hs=[...acc.holdings];
  if(S.search){const q=S.search.toLowerCase();hs=hs.filter(h=>h.name.toLowerCase().includes(q)||h.ticker.toLowerCase().includes(q));}
  hs.sort((a,b)=>{
    if(S.sort==='name'||S.sort==='type') return S.sortDir*a[S.sort].localeCompare(b[S.sort]);
    return S.sortDir*(a[S.sort]-b[S.sort]);
  });
  return hs;
}

function renderHoldsHTML(acc) {
  const el=document.getElementById('js-holds'); if(!el) return;

  if(!hs.length){el.innerHTML=`<div style="text-align:center;padding:30px 20px;color:var(--text2);font-size:14px">Aucun résultat</div>`;return;}
  el.innerHTML=`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin:0 20px;overflow:hidden">`+
    hs.map(h=>`
      <div class="hold-item" data-hid="${h.id}">

        <div class="flex1 col gap4" style="min-width:0">

        </div>
      </div>`).join('')+
  `</div>`;
  // Navigate on row click (excluding action buttons)
  el.querySelectorAll('.hold-item').forEach(item=>{

    e.stopPropagation();

  }));
  el.querySelectorAll('.hold-del-btn').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();

  }));
}


function deleteHolding(accId,holdId) {
  const acc=S.accounts.find(a=>a.id===accId); if(!acc) return;
  acc.holdings=acc.holdings.filter(h=>h.id!==holdId);
  acc.value=acc.holdings.reduce((s,h)=>s+h.value,0);
  renderHoldsHTML(acc);
  renderScreen('dashboard');
  toast('Position supprimée');
}

function applyRefresh(accId) {
  S._histCache={};
  // Refresh watchlist prices
  S.watchlist.forEach(w=>{
    const chg=(Math.random()*.03-.01);
    w.price=+(w.price*(1+chg)).toFixed(2);
    w.change1d=+((Math.random()*4-1.5).toFixed(2));
  });
  const accs=accId?[S.accounts.find(a=>a.id===accId)]:S.accounts;
  accs.filter(Boolean).forEach(acc=>{
    acc.holdings.forEach(h=>{
      const chg=(Math.random()*.028-.006);
      h.currentPrice=+(h.currentPrice*(1+chg)).toFixed(2);
      h.value=+(h.quantity*h.currentPrice).toFixed(2);
      h.pnl=(h.currentPrice-h.avgBuyPrice)*h.quantity;
      h.pnlPct=((h.currentPrice-h.avgBuyPrice)/h.avgBuyPrice)*100;
    });
    acc.value=acc.holdings.reduce((s,h)=>s+h.value,0);
    acc.change1d=+(Math.random()*4-1).toFixed(2);
  });
}

function initPTR(screenEl, onRefresh) {
  let y0=0,pulling=false,dist=0;
  const bar=screenEl.querySelector('#js-ptr'); if(!bar) return;
  screenEl.addEventListener('touchstart',e=>{
    if(e.target.closest('.hold-item')) return;
    if(screenEl.scrollTop===0){y0=e.touches[0].clientY;pulling=false;dist=0;}
  },{passive:true});
  screenEl.addEventListener('touchmove',e=>{
    if(screenEl.scrollTop>2) return;
    const dy=e.touches[0].clientY-y0;
    if(dy>12){pulling=true;dist=dy;bar.classList.add('open');bar.textContent=dy>60?'↑ Relâchez pour actualiser':'↓ Tirez pour actualiser';}
  },{passive:true});
  screenEl.addEventListener('touchend',()=>{
    if(!pulling) return;
    if(dist>60){
      bar.innerHTML='<span class="ptr-spin">↻</span> Actualisation…';
      setTimeout(()=>{onRefresh();bar.classList.remove('open');},900);
    } else {bar.classList.remove('open');}
    pulling=false; dist=0;
  },{passive:true});
}

function renderStock() {
  const acc=S.accounts.find(a=>a.id===S.accountId); if(!acc) return '';

  const invested=h.avgBuyPrice*h.quantity;

  const pnlPct=(pnl/invested)*100;
  const spark=sparkData(h.avgBuyPrice*.92,32,.025); spark[spark.length-1]=h.currentPrice;
  const color=pnl>=0?'#00D68F':'#FF5A5A';

  const divTotal=h.transactions.filter(t=>t.type==='DIV').reduce((s,t)=>s+t.qty*t.price,0);

    <div class="sim-head">Simulateur de revente</div>
    <div class="sim-price-display t-num" id="js-sim-price">${fmtCur(h.currentPrice)}</div>
    <div class="sim-chg" id="js-sim-chg" style="color:var(--text2)">Prix actuel</div>
    <input class="sim-range" type="range" id="js-sim-range"

      data-min="${simMin.toFixed(2)}" data-max="${simMax.toFixed(2)}"
      data-qty="${h.quantity}" data-pru="${h.avgBuyPrice}" data-ispea="${isPea?1:0}">
    <div id="js-sim-results">
      ${simResults(h.currentPrice, h.quantity, h.avgBuyPrice, isPea)}
    </div>
  </div>`;

  return `<div class="back tap" id="js-back">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    ${acc.name}
  </div>
  <div class="stock-hero">
    <div class="stock-ticker-badge">${h.ticker}</div>
    <div style="font-size:19px;font-weight:800;letter-spacing:-.4px">${h.name}</div>
    <div class="stock-price t-num">${fmtCur(h.currentPrice)}</div>
    <div class="row gap8" style="margin-bottom:12px">
      <div class="badge ${pnl>=0?'up':'dn'}">${pnl>=0?'▲':'▼'} ${Math.abs(pnlPct).toFixed(2)}%</div>
      <span class="t-sm">${h.type} · ${h.country} · ${h.sector}</span>
    </div>
    ${sparkSvg(spark,Math.min(window.innerWidth,480)-40,66,color,true)}

  <div class="metrics">

}

function simResults(price, qty, pru, isPea) {
  const gross = (price - pru) * qty;
  const netPfu = gross > 0 ? gross * 0.70 : gross;
  const netPea = gross; // 0% tax in PEA (exonéré)
  const gColor = gross >= 0 ? 'var(--gain)' : 'var(--loss)';
  return `<div class="sim-res-row">
    <div class="sim-res-lbl">Gain brut</div>
    <div class="sim-res-val t-num" style="color:${gColor}">${gross>=0?'+':''}${fmtCur(gross)}</div>
  </div>
  <div class="sim-res-row">
    <div class="sim-res-lbl">Net après PFU (30%)</div>
    <div class="sim-res-val t-num" style="color:${gColor}">${netPfu>=0?'+':''}${fmtCur(netPfu)}</div>
  </div>
  ${isPea?`<div class="sim-res-row">
    <div class="sim-res-lbl">Net PEA <span style="font-size:10px;color:var(--gain)">exonéré</span></div>
    <div class="sim-res-val t-num" style="color:${gColor}">${netPea>=0?'+':''}${fmtCur(netPea)}</div>
  </div>`:''}`;
}

// ── TARGETS BLOCK ──
function renderTargetsBlock(byType, tot) {
  const types = ['Action','ETF','Obligation','Cash'];
  const colors = { Action:'#4F8EF7', ETF:'#00C2CB', Obligation:'#00D68F', Cash:'#F59E0B' };
  const rows = types.map(t => {
    const actual = tot > 0 ? (byType[t] || 0) / tot * 100 : 0;
    const target = S.targets[t] || 0;
    const dev = actual - target;
    const devColor = Math.abs(dev) < 2 ? 'var(--text2)' : dev > 0 ? 'var(--gain)' : 'var(--loss)';
    const devStr = (dev >= 0 ? '+' : '') + dev.toFixed(1) + '%';
    const tgtMarkPct = Math.min(100, target);
    return `<div class="tgt-row">
      <div class="tgt-label">${t}</div>
      <div class="tgt-bars">
        <div class="tgt-bar-bg">
          <div class="tgt-bar-actual" style="width:${Math.min(100,actual).toFixed(1)}%;background:${colors[t]}"></div>
          <div class="tgt-mark-line" style="left:${tgtMarkPct.toFixed(1)}%"></div>
        </div>
      </div>
      <input class="tgt-inp" data-type="${t}" type="number" min="0" max="100" value="${target}" title="Objectif %">
      <span style="font-size:10px;color:var(--text3)">%</span>
      <div class="tgt-dev" style="color:${devColor}">${devStr}</div>
    </div>`;
  }).join('');
  const totalTarget = types.reduce((s,t) => s + (S.targets[t]||0), 0);
  const totColor = Math.abs(totalTarget - 100) < 1 ? 'var(--gain)' : 'var(--loss)';
  return `<div class="tgt-block anim">
    <div style="font-size:11px;color:var(--text3);margin-bottom:10px">Cliquez sur les % pour les modifier · barre bleue = objectif</div>
    ${rows}
    <div style="display:flex;justify-content:flex-end;gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
      <span style="font-size:11px;color:var(--text2)">Total objectifs :</span>
      <span style="font-size:11px;font-weight:800;color:${totColor}">${totalTarget}%</span>
    </div>
  </div>`;
}

const GEO_C=['#4F8EF7','#F59E0B','#00D68F','#A78BFA','#FF5A5A','#F97316'];
const TYPE_C={'Action':'#4F8EF7','ETF':'#00C2CB','Obligation':'#00D68F','Cash':'#F59E0B'};
const SEC_C=['#4F8EF7','#00C2CB','#00D68F','#F59E0B','#A78BFA','#FF5A5A','#F97316','#EC4899'];

function buildSegs(obj, colors) {
  const tot=Object.values(obj).reduce((s,v)=>s+v,0);
  return Object.entries(obj).sort((a,b)=>b[1]-a[1]).map(([name,value],i)=>({
    name, value,
    color: colors[name]||colors[i%colors.length],
    pct: (value/tot*100).toFixed(1)
  }));
}
function donutBlock(title, segs) {
  const legend=segs.map(s=>`<div class="legend-row">
    <div class="leg-dot" style="background:${s.color}"></div>
    <div class="leg-name">${s.name}</div>
    <div class="leg-pct" style="color:${s.color}">${s.pct}%</div>
  </div>`).join('');
  return `<div class="donut-block anim">
    ${donutSvg(segs,108,16)}
    <div class="legend">${legend}</div>
  </div>`;
}

// EVENT BINDING
// ═══════════════════════════════════════════════
function bindEvents(id, el) {
  if(id==='dashboard') {
    el.querySelectorAll('[data-acc]').forEach(c=>c.addEventListener('click',()=>{
      if(S.accountId!==c.dataset.acc){S.search='';S.sort='value';S.sortDir=-1;}
      S.accountId=c.dataset.acc; go('account');
    }));
    // History period selector
    el.querySelectorAll('.hperiod').forEach(p=>p.addEventListener('click',()=>{
      S.histPeriod=p.dataset.period;
      const wrap=el.querySelector('#js-hist-wrap');
      const tip=el.querySelector('#js-hist-tip');
      if(!wrap) return;
      const pts=genHistData(S.histPeriod);
      const chartW=Math.min(window.innerWidth,480)-72;
      wrap.innerHTML=histSvg(pts,chartW,80)+'<div class="hist-tip" id="js-hist-tip"></div>';
      el.querySelectorAll('.hperiod').forEach(x=>x.classList.toggle('on',x.dataset.period===S.histPeriod));
      // Update range line
      const pct=((pts[pts.length-1]-pts[0])/pts[0]*100);
      const color=pct>=0?'var(--gain)':'var(--loss)';
      const rangeEl=el.querySelector('.hist-range');
      if(rangeEl) rangeEl.innerHTML=`<span>${fmtCur(pts[0])}</span><span style="font-weight:700;color:${color}">${pct>=0?'+':''}${pct.toFixed(2)}%</span><span>${fmtCur(pts[pts.length-1])}</span>`;
      initHistChart(el.querySelector('.hist-card'), pts);
    }));
    // Init chart interaction
    const histCard=el.querySelector('.hist-card');
    if(histCard) initHistChart(histCard, genHistData(S.histPeriod));
    // Gear → settings
    el.querySelector('#js-settings-btn')?.addEventListener('click', ()=>go('settings'));
    // Add account
    el.querySelector('#js-acc-add')?.addEventListener('click', ()=>toast('Ajout de compte — bientôt disponible'));
    // Add watchlist item
    el.querySelector('#js-watch-add')?.addEventListener('click', ()=>toast('Ajout de titre — bientôt disponible'));
  }
  if(id==='account') {
    const acc=S.accounts.find(a=>a.id===S.accountId);
    el.querySelector('#js-back')?.addEventListener('click',back);

    // Populate holdings
    if(acc) renderHoldsHTML(acc);

    // Add holding button
    el.querySelector('#js-add-hold')?.addEventListener('click',()=>toast('Ajout de position — bientôt disponible'));

    // Search
    el.querySelector('#js-search')?.addEventListener('input',e=>{
      S.search=e.target.value;
      const sb=el.querySelector('.search-box');
      let clr=sb.querySelector('.search-clear');
      if(S.search&&!clr){
        clr=document.createElement('div');clr.className='search-clear';clr.id='js-clr';clr.textContent='✕';
        clr.addEventListener('click',()=>{S.search='';el.querySelector('#js-search').value='';clr.remove();if(acc)renderHoldsHTML(acc);});
        sb.appendChild(clr);
      } else if(!S.search&&clr){clr.remove();}
      if(acc) renderHoldsHTML(acc);
    });
    el.querySelector('#js-clr')?.addEventListener('click',()=>{
      S.search='';el.querySelector('#js-search').value='';el.querySelector('.search-clear')?.remove();
      if(acc) renderHoldsHTML(acc);
    });

    // Sort pills
    el.querySelectorAll('.sort-pill').forEach(pill=>pill.addEventListener('click',()=>{
      const key=pill.dataset.sort;
      if(S.sort===key) S.sortDir*=-1;
      else{S.sort=key;S.sortDir=SORT_DEFAULTS[key]||(-1);}
      el.querySelectorAll('.sort-pill').forEach(p=>{
        const on=p.dataset.sort===S.sort;
        p.classList.toggle('on',on);
        p.textContent=p.dataset.label+(on?(S.sortDir===-1?' ↓':' ↑'):'');
      });
      if(acc) renderHoldsHTML(acc);
    }));

    // Pull to refresh
    initPTR(el,()=>{
      if(!acc) return;
      applyRefresh(S.accountId);
      renderHoldsHTML(acc);
      const v=el.querySelector('#js-acc-val');
      if(v) v.textContent=fmtCur(acc.value);
      renderScreen('dashboard');
      renderScreen('analysis');
      toast('Cours actualisés ↻');
    });
  }
  if(id==='stock') {
    el.querySelector('#js-back')?.addEventListener('click',back);
    const slider=el.querySelector('#js-sim-range');
    if(slider) {
      slider.addEventListener('input',()=>{
        const pct=parseInt(slider.value)/100;
        const minP=parseFloat(slider.dataset.min);
        const maxP=parseFloat(slider.dataset.max);
        const price=minP+(maxP-minP)*pct;
        const qty=parseFloat(slider.dataset.qty);
        const pru=parseFloat(slider.dataset.pru);
        const isPea=slider.dataset.ispea==='1';
        const priceEl=el.querySelector('#js-sim-price');
        const chgEl=el.querySelector('#js-sim-chg');
        const resEl=el.querySelector('#js-sim-results');
        if(priceEl) priceEl.textContent=fmtCur(price);
        if(chgEl){
          const chgPct=(price-pru)/pru*100;
          chgEl.textContent=(chgPct>=0?'+':'')+chgPct.toFixed(2)+'% vs PRU';
          chgEl.style.color=chgPct>=0?'var(--gain)':'var(--loss)';
        }
        if(resEl) resEl.innerHTML=simResults(price,qty,pru,isPea);
      });
    }
  }
  if(id==='analysis') {
    el.querySelector('#js-settings-btn')?.addEventListener('click', ()=>go('settings'));
    // Use event delegation so it survives partial DOM replacement
    el.addEventListener('input', e => {
      const inp = e.target.closest('.tgt-inp');
      if (!inp) return;
      S.targets[inp.dataset.type] = Math.max(0, Math.min(100, parseFloat(inp.value) || 0));
      // Refresh bars + totals in-place without losing focus
      const all = S.accounts.flatMap(a => a.holdings);
      const tot = all.reduce((s, h) => s + h.value, 0);
      const byType = {};
      all.forEach(h => { byType[h.type] = (byType[h.type] || 0) + h.value; });
      ['Action','ETF','Obligation','Cash'].forEach(t => {
        const actual = tot > 0 ? (byType[t] || 0) / tot * 100 : 0;
        const target = S.targets[t] || 0;
        const dev = actual - target;
        const row = el.querySelector(`.tgt-inp[data-type="${t}"]`)?.closest('.tgt-row');
        if (!row) return;
        const bar = row.querySelector('.tgt-bar-actual');
        if (bar) bar.style.width = Math.min(100, actual).toFixed(1) + '%';
        const mark = row.querySelector('.tgt-mark-line');
        if (mark) mark.style.left = Math.min(100, target).toFixed(1) + '%';
        const devEl = row.querySelector('.tgt-dev');
        if (devEl) {
          devEl.textContent = (dev >= 0 ? '+' : '') + dev.toFixed(1) + '%';
          devEl.style.color = Math.abs(dev) < 2 ? 'var(--text2)' : dev > 0 ? 'var(--gain)' : 'var(--loss)';
        }
      });
      // Update total
      const totalTarget = ['Action','ETF','Obligation','Cash'].reduce((s,t) => s + (S.targets[t]||0), 0);
      const totEl = el.querySelector('.tgt-block > div:last-child span:last-child');
      if (totEl) {
        totEl.textContent = totalTarget + '%';
        totEl.style.color = Math.abs(totalTarget - 100) < 1 ? 'var(--gain)' : 'var(--loss)';
      }
    });
  }
  if(id==='settings') {
    el.querySelector('#js-back')?.addEventListener('click',back);
    el.querySelector('#js-name')?.addEventListener('change',e=>{
      S.user.name=e.target.value||S.user.name;
      renderScreen('dashboard');
      toast('Nom mis à jour');
    });
    el.querySelector('#js-demo-tog')?.addEventListener('click',()=>{
      if(S.accounts.length){ S.accounts=[]; toast('Données effacées'); }
      else { S.accounts=genDemo(); toast('Mode démo activé ✓'); }
      renderScreen('dashboard'); renderScreen('analysis');
      el.querySelector('#js-demo-tog').classList.toggle('on',S.accounts.length>0);
    });
    el.querySelector('#js-csv-btn')?.addEventListener('click',()=>document.getElementById('csv-file').click());
    el.querySelectorAll('[data-cur]').forEach(b=>b.addEventListener('click',()=>{
      S.currency=b.dataset.cur;
      el.querySelectorAll('[data-cur]').forEach(x=>x.classList.toggle('on',x.dataset.cur===S.currency));
      renderScreen('dashboard'); renderScreen('analysis');
      toast('Devise : '+S.currency);
    }));
    el.querySelector('#js-theme-tog')?.addEventListener('click',()=>{
      S.theme=S.theme==='dark'?'light':'dark';
      document.documentElement.setAttribute('data-theme',S.theme==='light'?'light':'');
      el.querySelector('#js-theme-tog').classList.toggle('on',S.theme==='dark');
      toast('Thème '+(S.theme==='dark'?'sombre':'clair'));
    });
  }
}

// CSV IMPORT
// ═══════════════════════════════════════════════
document.getElementById('csv-file').addEventListener('change',function(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>parseCSV(ev.target.result);
  r.readAsText(f); this.value='';
});

function parseCSV(text) {
  const lines=text.trim().split('\n'); if(lines.length<2){toast('CSV vide');return;}
  const hdrs=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/"/g,''));
  let added=0;
  lines.slice(1).forEach(line=>{
    const cols=line.split(',').map(v=>v.trim().replace(/"/g,''));
    const row={}; hdrs.forEach((h,i)=>row[h]=cols[i]||'');
    const accName=row.account||row.compte;
    const ticker=(row.ticker||row.code||'').toUpperCase();
    const name=row.name||row.nom||ticker;
    const date=row.date;
    const type=(row.type||'BUY').toUpperCase();
    const qty=parseFloat(row.quantity||row.quantite||0);
    const price=parseFloat(row.price||row.prix||0);
    if(!accName||!ticker||!qty||!price) return;
    let acc=S.accounts.find(a=>a.name.toLowerCase()===accName.toLowerCase());
    if(!acc){
      acc={id:'csv_'+accName.replace(/\W+/g,'_').toLowerCase(),name:accName,type:'Compte importé',icon:'📊',iconBg:'rgba(245,158,11,.13)',value:0,change1d:0,holdings:[]};
      S.accounts.push(acc);
    }
    let h=acc.holdings.find(h=>h.ticker===ticker);
    if(!h){
      h={id:ticker,ticker,name,quantity:0,avgBuyPrice:price,currentPrice:price,type:'Action',country:'Inconnu',sector:'Inconnu',transactions:[],value:0,pnl:0,pnlPct:0};
      acc.holdings.push(h);
    }
    h.transactions.push({date:date||new Date().toISOString().slice(0,10),type,qty,price});
    if(type==='BUY'){
      const newQty=h.quantity+qty;
      h.avgBuyPrice=((h.avgBuyPrice*h.quantity)+(price*qty))/newQty;
      h.quantity=newQty;
    } else { h.quantity=Math.max(0,h.quantity-qty); }
    h.currentPrice=price;
    h.value=h.quantity*h.currentPrice;
    h.pnl=(h.currentPrice-h.avgBuyPrice)*h.quantity;
    h.pnlPct=h.avgBuyPrice>0?((h.currentPrice-h.avgBuyPrice)/h.avgBuyPrice)*100:0;
    added++;
  });
  S.accounts.forEach(a=>{ a.value=a.holdings.reduce((s,h)=>s+h.value,0); });
  renderScreen('dashboard'); renderScreen('analysis'); renderScreen('settings');
  toast(`${added} mouvement(s) importé(s)`);
}

document.querySelectorAll('.type-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.type-btn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  _mType=b.dataset.type;
  // Show/hide qty field for DIV (qty = nb of shares held = informational)
  const qtyLabel=document.querySelector('#modal-qty').closest('.form-field').querySelector('.form-label');
  qtyLabel.textContent=_mType==='DIV'?'Nb actions':'Quantité';
  const priceLabel=document.querySelector('#modal-price').closest('.form-field').querySelector('.form-label');
  priceLabel.textContent=_mType==='DIV'?'Dividende/action':'Prix unitaire';
}));

document.getElementById('modal-submit').addEventListener('click',()=>{
  const qty=parseFloat(document.getElementById('modal-qty').value);
  const price=parseFloat(document.getElementById('modal-price').value);
  const date=document.getElementById('modal-date').value||new Date().toISOString().slice(0,10);
  if(!(qty>0)||!(price>0)){toast('Quantité et prix requis');return;}
  const acc=S.accounts.find(a=>a.id===_mAccId);
  const h=acc?.holdings.find(h=>h.id===_mHoldId);
  if(!h){toast('Position introuvable');return;}
  h.transactions.push({date,type:_mType,qty,price});
  if(_mType==='BUY'){
    const nq=h.quantity+qty;
    h.avgBuyPrice=(h.avgBuyPrice*h.quantity+price*qty)/nq;
    h.quantity=nq;
  } else if(_mType==='SELL'){
    h.quantity=Math.max(0,h.quantity-qty);
  }
  h.value=+(h.quantity*h.currentPrice).toFixed(2);
  h.pnl=(h.currentPrice-h.avgBuyPrice)*h.quantity;
  h.pnlPct=h.avgBuyPrice>0?((h.currentPrice-h.avgBuyPrice)/h.avgBuyPrice)*100:0;
  acc.value=acc.holdings.reduce((s,h)=>s+h.value,0);
  closeModal();
  const accEl=document.getElementById('s-account');
  const holdsEl=accEl?.querySelector('#js-holds');
  if(holdsEl) renderHoldsHTML(acc);
  renderScreen('dashboard');
  renderScreen('analysis');
  const lbl={BUY:'Achat',SELL:'Vente',DIV:'Dividende'}[_mType];
  toast(`${lbl} enregistré ✓`);
});

// BOTTOM NAV
// ═══════════════════════════════════════════════
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>{
  const t=b.dataset.nav;
  if(t===S.screen) return;
  // Direction based on tab order: going left = 'back' (slide in from left), right = 'forward'
  const fi=NAV_SCREENS.indexOf(S.screen), ti=NAV_SCREENS.indexOf(t);
  const dir = (fi>=0 && ti<fi) ? 'back' : 'forward';
  go(t, dir);
}));

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

// ═══════════════════════════════════════════════
S.accounts=genDemo();
['dashboard','analysis','settings'].forEach(renderScreen);
document.getElementById('nav').classList.remove('hidden');

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[SW] Registered, scope:', reg.scope))
      .catch(err => console.warn('[SW] Registration failed:', err));
  });
}
