<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1e3a8a"/>
      <stop offset="55%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background (maskable safe) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="420" cy="80"  r="130" fill="rgba(255,255,255,0.06)"/>
  <circle cx="100" cy="440" r="110" fill="rgba(255,255,255,0.04)"/>
  <!-- Chart area fill -->
  <polygon
    points="115,385 195,268 258,308 338,182 397,150 397,385"
    fill="rgba(255,255,255,0.10)"/>
  <!-- Chart shadow line -->
  <polyline
    points="115,385 195,268 258,308 338,182 397,150"
    fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="30"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Chart main line -->
  <polyline
    points="115,385 195,268 258,308 338,182 397,150"
    fill="none" stroke="url(#line)" stroke-width="16"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- End dot glow -->
  <circle cx="397" cy="150" r="28" fill="rgba(255,255,255,0.25)"/>
  <circle cx="397" cy="150" r="16" fill="white"/>
</svg>
